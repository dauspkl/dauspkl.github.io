<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Sarana & Prasarana</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    /* Background tetap seperti desain awal */
    background: linear-gradient(
        135deg,
        #000000 0%,
        #8b0000 50%,
        #ffcc00 100%
    );
}

.dashboard-container{

    position:relative;
    overflow:hidden;

    width:470px;
    max-width:92%;

    padding:35px;

    border-radius:20px;

    background:url("gedung.png") center/cover no-repeat;

    box-shadow:0 20px 45px rgba(0,0,0,.45);

}

.dashboard-container::before{

    content:"";
    position:absolute;
    inset:0;

    background:rgba(0,0,0,.28);

    backdrop-filter:blur(3px);

}

.dashboard-content{

    position:relative;
    z-index:2;
    text-align:center;

}

.logo-ftik{

    width:190px;
    margin-bottom:18px;

}

h2{

    color:white;
    font-size:28px;
    margin-bottom:8px;
    text-shadow:0 2px 5px rgba(0,0,0,.5);

}

p{

    color:#f2f2f2;
    font-size:15px;
    margin-bottom:28px;
    text-shadow:0 2px 5px rgba(0,0,0,.5);

}

.button-group{

    display:flex;
    flex-direction:column;
    gap:14px;

}

.btn-sheet{

    text-decoration:none;
    color:white;

    padding:15px;

    border-radius:12px;

    font-weight:600;

    transition:.3s;

    box-shadow:0 8px 18px rgba(0,0,0,.25);

}

.btn-sheet:hover{

    transform:translateY(-4px);

    box-shadow:0 14px 25px rgba(0,0,0,.35);

    filter:brightness(1.05);

}

.btn-1{

    background:#dc2626;

}

.btn-2{

    background:#b91c1c;

}

.btn-disabled{

    background:#4b4b4b;
    color:#d9d9d9;

    pointer-events:none;
    cursor:not-allowed;

    opacity:.8;

}

.btn-warning{

    background:#eab308;
    color:#1a1a1a;

    pointer-events:none;
    cursor:not-allowed;

}

.footer{

    margin-top:25px;

    color:white;

    font-size:12px;

    opacity:.85;

}

</style>

</head>

<body>

<div class="dashboard-container">

<div class="dashboard-content">

<img src="FTIK.png" alt="Logo FTIK" class="logo-ftik">

<h2>Dashboard</h2>

<p>Layanan Sarana dan Prasarana FTIK</p>

<div class="button-group">

<a href="https://docs.google.com/forms/d/e/1FAIpQLScyV_of33L8r6ScMpLpI_oPHgxrSZyTxv8X5JPYubOPKw6Vew/viewform?usp=dialog"
target="_blank"
class="btn-sheet btn-1">
Peminjaman Alat dan Barang
</a>

<a href="https://docs.google.com/forms/d/e/1FAIpQLSd7xQ57W_LTi_FLtBcKxC5q8Tm7VMw20FG2W8FUZr3L_uIouw/viewform?usp=dialog"
target="_blank"
class="btn-sheet btn-2">
Peminjaman Ruang
</a>

<a class="btn-sheet btn-disabled">
BELUM TERSEDIA
</a>

<a class="btn-sheet btn-disabled">
BELUM TERSEDIA
</a>

<a class="btn-sheet btn-warning">
SEGERA HADIR
</a>

</div>

<div class="footer">

© 2024 FTIK • Dashboard Sarana & Prasarana

</div>

</div>

</div>

</body>
</html>
